<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78D1A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39A17C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
      <feOffset dx="3" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#F4F7F6" />

  <!-- Background elements - subtle leaf shapes -->
  <path d="M200,100 Q250,50 300,100 T400,200 T300,300 Q250,350 200,300 T100,200 Z" fill="#E0E8E2" opacity="0.7" filter="url(#shadow)" transform="translate(-50, -50) scale(0.8)" />
  <path d="M500,250 Q550,200 600,250 T700,350 T600,450 Q550,500 500,450 T400,350 Z" fill="#E0E8E2" opacity="0.7" filter="url(#shadow)" transform="translate(50, 50) scale(0.8)" />

  <!-- Core Illustration: AI + Botanical -->

  <!-- AI Brain/Node Icon -->
  <g transform="translate(200, 250) scale(0.8)">
    <circle cx="0" cy="0" r="50" fill="#FFFFFF" stroke="#333333" stroke-width="2" filter="url(#shadow)" />
    <circle cx="0" cy="0" r="40" fill="url(#gradient1)" />

    <!-- Network lines -->
    <line x1="0" y1="0" x2="40" y2="-30" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />
    <line x1="0" y1="0" x2="0" y2="40" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />
    <line x1="0" y1="0" x2="-30" y2="30" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />

    <!-- Small nodes on lines -->
    <circle cx="20" cy="-15" r="5" fill="#F0C808" />
    <circle cx="0" cy="20" r="5" fill="#F0C808" />
    <circle cx="-15" cy="15" r="5" fill="#F0C808" />
  </g>

  <!-- Stylized Botanical Elements -->
  <!-- Leaf 1 - Transformed -->
  <g transform="translate(450, 200) rotate(20) scale(0.7)">
    <path d="M0 0 C20 -30 60 -30 80 0 C60 30 20 30 0 0 Z" fill="white" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)" />
    <path d="M0 0 C15 -20 45 -20 60 0 C45 20 15 20 0 0 Z" fill="url(#gradient1)" />
    <path d="M40 0 L50 -15 L60 0 L50 15 Z" fill="#F0C808" />
    <path d="M20 0 L25 -7.5 L30 0 L25 7.5 Z" fill="#F0C808" />
  </g>

  <!-- Flower Bud/Shape 2 - Being stylized -->
  <g transform="translate(550, 400) rotate(-15) scale(0.6)">
    <circle cx="0" cy="0" r="40" fill="white" stroke="#9C27B0" stroke-width="2" filter="url(#shadow)" />
    <ellipse cx="0" cy="15" rx="30" ry="20" fill="url(#gradient2)" transform="rotate(10)" />
    <circle cx="15" cy="-10" r="10" fill="#FFFFFF" opacity="0.8" />
    <circle cx="-15" cy="-10" r="10" fill="#FFFFFF" opacity="0.8" />
  </g>

  <!-- Abstract "Style Transfer" Element -->
  <g transform="translate(350, 350) scale(0.7)">
    <path d="M0 0 L100 50 L50 100 L-50 50 Z" fill="rgba(255,255,255,0.3)" stroke="#AAAAAA" stroke-width="1" />
    <path d="M10 10 L90 60 L55 90 L-40 50 Z" fill="url(#gradient1)" opacity="0.7" />
    <path d="M0 0 L100 50 L50 100 L-50 50 Z" fill="url(#gradient2)" opacity="0.7" transform="translate(20, 20) scale(0.8)" />
  </g>

  <!-- Text Label - Minimalist -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#333333">AI-Driven Botanical Style Transfer</text>
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#666666">Niche Illustration</text>

</svg>